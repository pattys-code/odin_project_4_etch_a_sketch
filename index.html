<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="sketch.js" defer></script>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <title>Etch a Sketch</title>
</head>
<body>
    <h1>Etch-a-Sketch</h1>

    <div class="pad">
        <div class="menu-container menu">
            <h2> Menu: </h2>
            <div class="slider menu">
                <label class="menu" for="size">grid size</label>
                <input type="range" required id="size" min="1" max="64" step="1" value="16">
                <span class="menu" id="size-text">16</span>
            </div>
            <button class="rainbow">activate rainbow mode</button>
            <button class="reset">clear grid</button>
            <button class="finish">finish drawing</button>
        </div>
        <div class="grid"></div>
    </div>
</body>
</html>
